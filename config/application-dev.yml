# 开发环境配置
# 覆盖 application.yml 中的配置

# Kafka 配置
kafka:
  bootstrap-servers: localhost:9092
  consumer:
    startup-mode: earliest  # 消费模式: earliest（从头开始）, latest（从最新开始）, committed（从上次提交位置开始）

# Doris 配置
doris:
  fe:
    http-url: http://127.0.0.1:8030
    jdbc-url: jdbc:mysql://127.0.0.1:9030
    username: root
    password: ""

# Flink 配置
flink:
  execution:
    parallelism: 2
  checkpoint:
    interval: 60000  # 60 秒（增加间隔，减少 Checkpoint 频率）
    timeout: 300000  # 5 分钟（增加超时时间，避免 Checkpoint 失败）

# 应用配置
application:
  logging:
    level: DEBUG
