# 生产环境配置
# 覆盖 application.yml 中的配置

# Kafka 配置
kafka:
  bootstrap-servers: kafka-prod:9092
  producer:
    acks: all
    retries: 5

# Doris 配置
doris:
  fe:
    http-url: http://doris-fe:8030
    jdbc-url: jdbc:mysql://doris-fe:9030
    username: ${DORIS_USERNAME}
    password: ${DORIS_PASSWORD}
  stream-load:
    batch-size: 5000
    batch-interval-ms: 3000

# Flink 配置
flink:
  execution:
    parallelism: 8
  checkpoint:
    interval: 120000
  state:
    checkpoint-dir: hdfs:///flink/checkpoints
    savepoint-dir: hdfs:///flink/savepoints

# 应用配置
application:
  logging:
    level: INFO
