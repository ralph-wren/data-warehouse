# Doris Docker Compose 配置
# 使用桥接网络 + 端口映射,确保 Flink 能连接
#
# Java UDF：宿主机目录 ./doris-udf 挂载为容器内 /opt/doris/udf（CREATE FUNCTION 的 file=file:///opt/doris/udf/xxx.jar）。
# 将 JAR 放入本仓库 doris-udf/ 后重启 FE/BE 或 docker compose up -d；与 quant-data-collect 的 mvn -Pdoris-udf 产物配合使用。
#
# 镜像：apache/doris:fe-3.0.8 / be-3.0.8（Docker Hub 含 linux/arm64 + amd64）。未写 platform，Apple Silicon 上默认拉 arm64，无需 Rosetta/Colima。
# 若从旧版/RC 升 3.0.8 后 FE/BE 起不来，多为元数据不兼容，可备份后清空 doris-fe-data / doris-be-data 对应 volume 再试。
# x86  Linux 或需强制 amd64 时：可取消注释各服务下的 platform 行。

services:
  doris-fe:
    image: apache/doris:fe-3.0.8
    # platform: linux/amd64   # 仅在需强制 amd64 时取消注释
    container_name: doris-fe
    hostname: doris-fe
    # 镜像 fe.conf 默认 JDK17 堆为 8G，本机/Colima 易 OOM；启动前改为 2G，并与 cgroup 上限对齐
    mem_limit: 2g
    memswap_limit: 2g
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        FE_CONF=/opt/apache-doris/fe/conf/fe.conf
        if grep -q -- '-Xmx8192m' "$$FE_CONF" 2>/dev/null; then
          sed -i.bak 's/-Xmx8192m/-Xmx2048m/g; s/-Xms8192m/-Xms2048m/g' "$$FE_CONF"
        fi
        exec bash /usr/local/bin/init_fe.sh
    ports:
      - "8030:8030"   # FE HTTP 端口
      - "9030:9030"   # FE MySQL 端口
      - "9010:9010"   # FE RPC 端口
    environment:
      # FE 配置 - 使用正确的格式: name:ip:port
      - FE_SERVERS=fe1:172.25.0.2:9010
      - FE_ID=1
      - PRIORITY_NETWORKS=172.25.0.0/16  # 指定使用的网络
      - TZ=Asia/Shanghai  # 设置时区为中国时区
    volumes:
      - ./volumes/doris/doris-fe-data:/opt/apache-doris/fe/doris-meta
      - ./volumes/doris/doris-fe-log:/opt/apache-doris/fe/log
      - ./volumes/doris/doris-udf:/opt/doris/udf
    networks:
      doris-net:
        ipv4_address: 172.25.0.2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/api/bootstrap"]
      interval: 10s
      timeout: 5s
      retries: 30

  doris-be:
    image: apache/doris:be-3.0.8
    # platform: linux/amd64   # 仅在需强制 amd64 时取消注释
    container_name: doris-be
    hostname: doris-be
    # BE 默认 /dev/shm 过小易导致进程异常退出；与官方 Docker 建议一致
    shm_size: "2gb"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    # BE 镜像 be.conf 中 JDK17 堆默认可为 2G；cgroup 略大于堆，覆盖 C++ 进程与 page cache
    mem_limit: 4g
    memswap_limit: 4g
    ports:
      - "8040:8040"   # BE HTTP 端口
      - "9050:9050"   # BE Heartbeat 端口
      - "8060:8060"   # BE Webserver 端口
      - "9060:9060"   # BE Brpc 端口
    environment:
      # BE 配置 - 连接到 FE (使用正确的格式: name:ip:port)
      - FE_SERVERS=fe1:172.25.0.2:9010
      - BE_ADDR=172.25.0.3:9050
      - PRIORITY_NETWORKS=172.25.0.0/16  # 指定使用的网络
      # be.conf 中 JAVA_HOME 常为注释，显式传入避免 doris_be 找不到 libjvm
      - JAVA_HOME=/usr/lib/jvm/java
      - TZ=Asia/Shanghai  # 设置时区为中国时区
    volumes:
      - ./volumes/doris/doris-be-data:/opt/apache-doris/be/storage
      - ./volumes/doris/doris-be-log:/opt/apache-doris/be/log
      - ./volumes/doris/doris-udf:/opt/doris/udf
    networks:
      doris-net:
        ipv4_address: 172.25.0.3
    depends_on:
      doris-fe:
        condition: service_healthy
    restart: unless-stopped

networks:
  doris-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  doris-fe-data:
  doris-fe-log:
  doris-be-data:
  doris-be-log:
