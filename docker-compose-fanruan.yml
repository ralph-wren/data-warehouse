# 帆软开源替代 Docker Compose 配置（Reportico, MIT License）
# 说明：
# - FineReport/FineBI 非开源，不能直接提供官方商业镜像。
# - 当前方案使用开源 Reportico 安装包构建本地镜像，保持 manage 脚本入口一致。

services:
  fanruan:
    build:
      context: .
      dockerfile: docker/fanruan-open/Dockerfile
      args:
        REPORTICO_VERSION: ${REPORTICO_VERSION:-8.1.0}
    image: fanruan-open:reportico-${REPORTICO_VERSION:-8.1.0}
    container_name: fanruan
    hostname: fanruan
    network_mode: bridge
    ports:
      - "${FANRUAN_HTTP_PORT:-8075}:80"
    environment:
      - TZ=${FANRUAN_TZ:-Asia/Shanghai}
    volumes:
      # Reportico 报表定义目录持久化（项目 XML 等）
      - ./volumes/fanruan/projects:/var/www/html/reportico/projects
      # Apache 访问日志持久化
      - ./volumes/fanruan/logs:/var/log/apache2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/reportico"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
