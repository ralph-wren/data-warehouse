# Flink Standalone 集群 Docker Compose 配置
# 用于 StreamPark 管理 Flink 作业

version: '3.8'

services:
  jobmanager:
    image: flink:1.17.0-scala_2.12-java11
    container_name: flink-jobmanager
    hostname: jobmanager
    ports:
      - "8081:8081"  # Web UI
      - "6123:6123"  # RPC
      - "9249:9249"  # Prometheus Metrics
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 4
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporter
        metrics.reporter.prom.port: 9249
    networks:
      - flink-net
      - default  # 连接到默认网络（Kafka）
      - doris-net  # 连接到 Doris 网络
      - monitoring-net  # 连接到监控网络
    restart: unless-stopped

  # TaskManager 1
  taskmanager-1:
    image: flink:1.17.0-scala_2.12-java11
    container_name: flink-taskmanager-1
    hostname: taskmanager-1
    ports:
      - "9250:9249"  # Prometheus Metrics (TaskManager 1)
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 4
        taskmanager.memory.managed.size: 512m
        state.backend.rocksdb.writebuffer.size: 64m
        state.backend.rocksdb.writebuffer.count: 3
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporter
        metrics.reporter.prom.port: 9249
    networks:
      - flink-net
      - default  # 连接到默认网络（Kafka）
      - doris-net  # 连接到 Doris 网络
      - monitoring-net  # 连接到监控网络
    restart: unless-stopped

  # TaskManager 2
  taskmanager-2:
    image: flink:1.17.0-scala_2.12-java11
    container_name: flink-taskmanager-2
    hostname: taskmanager-2
    ports:
      - "9251:9249"  # Prometheus Metrics (TaskManager 2)
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 4
        taskmanager.memory.managed.size: 512m
        state.backend.rocksdb.writebuffer.size: 64m
        state.backend.rocksdb.writebuffer.count: 3
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporter
        metrics.reporter.prom.port: 9249
    networks:
      - flink-net
      - default  # 连接到默认网络（Kafka）
      - doris-net  # 连接到 Doris 网络
      - monitoring-net  # 连接到监控网络
    restart: unless-stopped

networks:
  flink-net:
    driver: bridge
  default:
    external: true
    name: data-warehouse_default
  doris-net:  # 添加 Doris 网络
    external: true
    name: data-warehouse_doris-net
  monitoring-net:  # 添加监控网络
    external: true
    name: data-warehouse_monitoring-net
