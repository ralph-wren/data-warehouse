version: '3.8'

services:
  # Prometheus - 指标收集
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - monitoring-net
    restart: unless-stopped

  # Grafana - 可视化
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    networks:
      - monitoring-net
      - doris-net  # 添加 Doris 网络,用于连接 Doris 数据库
    depends_on:
      - prometheus
    restart: unless-stopped

  # Pushgateway - 用于接收 Flink 推送的指标
  pushgateway:
    image: prom/pushgateway:latest
    container_name: pushgateway
    ports:
      - "9091:9091"
    networks:
      - monitoring-net
    restart: unless-stopped

  # Kafka Exporter - Kafka 基础指标导出
  # 注意: Kafka 的 advertised.listeners 配置为 localhost:9092
  # 需要 Kafka Exporter 能够访问宿主机的 Kafka
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    ports:
      - "9308:9308"
    # 使用命令行参数指定 Kafka 地址
    command:
      - '--kafka.server=host.docker.internal:9092'
      - '--log.level=info'
    networks:
      - monitoring-net
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # JMX Exporter - Kafka 详细指标导出 (通过 JMX)
  # 提供消息速率、LAG、吞吐量等详细监控指标
  jmx-exporter:
    image: bitnami/jmx-exporter:latest
    container_name: kafka-jmx-exporter
    ports:
      - "5556:5556"
    volumes:
      - ./monitoring/jmx-exporter/kafka.yml:/etc/jmx-exporter/config.yml:ro
    # JMX Exporter 启动参数: [HOST:]PORT CONFIG_FILE
    # JMX 连接地址在配置文件中通过 hostPort 指定
    command:
      - "5556"
      - "/etc/jmx-exporter/config.yml"
    networks:
      - monitoring-net
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # 注意: Doris 有原生的 Prometheus metrics 端点
  # FE: http://host.docker.internal:8030/metrics
  # BE: http://host.docker.internal:8040/metrics
  # 不需要 MySQL Exporter，直接在 Prometheus 配置中抓取

networks:
  monitoring-net:
    name: data-warehouse_monitoring-net
    external: true
  doris-net:
    name: data-warehouse_doris-net
    external: true

volumes:
  prometheus-data:
  grafana-data:
