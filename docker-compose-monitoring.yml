version: '3.8'

services:
  # Prometheus - 指标收集
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - monitoring-net
    restart: unless-stopped

  # Grafana - 可视化
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    networks:
      - monitoring-net
    depends_on:
      - prometheus
    restart: unless-stopped

  # Pushgateway - 用于接收 Flink 推送的指标
  pushgateway:
    image: prom/pushgateway:latest
    container_name: pushgateway
    ports:
      - "9091:9091"
    networks:
      - monitoring-net
    restart: unless-stopped

  # Kafka Exporter - Kafka 基础指标导出
  # 注意: Kafka 的 advertised.listeners 配置为 localhost:9092
  # 需要 Kafka Exporter 能够访问宿主机的 Kafka
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    ports:
      - "9308:9308"
    # 使用命令行参数指定 Kafka 地址
    command:
      - '--kafka.server=host.docker.internal:9092'
      - '--log.level=info'
    networks:
      - monitoring-net
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # JMX Exporter - Kafka 详细指标导出 (通过 JMX)
  # 提供消息速率、LAG、吞吐量等详细监控指标
  jmx-exporter:
    image: bitnami/jmx-exporter:latest
    container_name: kafka-jmx-exporter
    ports:
      - "5556:5556"
    volumes:
      - ./monitoring/jmx-exporter/kafka.yml:/etc/jmx-exporter/config.yml:ro
    # JMX Exporter 启动参数: [HOST:]PORT CONFIG_FILE
    # JMX 连接地址在配置文件中通过 hostPort 指定
    command:
      - "5556"
      - "/etc/jmx-exporter/config.yml"
    networks:
      - monitoring-net
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # MySQL Exporter - 用于监控 Doris(通过 MySQL 协议)
  # 注意: Doris 不完全兼容 MySQL,只采集基本的全局状态指标
  mysql-exporter:
    image: prom/mysqld-exporter:v0.14.0
    container_name: mysql-exporter
    ports:
      - "9104:9104"
    environment:
      # 连接宿主机的 Doris
      - DATA_SOURCE_NAME=root:@tcp(host.docker.internal:9030)/
    # 只采集全局状态,禁用所有其他采集器
    command:
      - '--collect.global_status'
      - '--no-collect.global_variables'
      - '--no-collect.slave_status'
      - '--no-collect.info_schema.innodb_metrics'
      - '--no-collect.info_schema.innodb_tablespaces'
      - '--no-collect.info_schema.innodb_cmp'
      - '--no-collect.info_schema.innodb_cmpmem'
      - '--no-collect.info_schema.query_response_time'
      - '--no-collect.info_schema.processlist'
      - '--no-collect.info_schema.tables'
      - '--no-collect.info_schema.tablestats'
      - '--no-collect.info_schema.userstats'
      - '--no-collect.perf_schema.eventswaits'
      - '--no-collect.perf_schema.file_events'
      - '--no-collect.perf_schema.tableiowaits'
      - '--no-collect.perf_schema.tablelocks'
    networks:
      - monitoring-net
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  monitoring-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
