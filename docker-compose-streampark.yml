# StreamPark Docker Compose 配置（本地兜底方案）
# 主流程已迁移为 Kubernetes 部署：请优先使用 manage-streampark.sh（K8s 模式）
# 本文件仅保留“纯 Docker 本地调试”场景。
#
# Docker 镜像仓库（Registry）不在本 compose 里配置。
# StreamPark k8s application 构建第 7 步「Push docker image」使用的地址/命名空间/账号来自：
#   - Web：设置 → 系统设置 → Docker Register Address / User / Password / Docker namespace
#   - 数据库：MySQL 表 t_setting，键 docker.register.address | user | password | namespace
#     （初始化见 config/streampark/mysql/init/02-streampark-data.sql，默认值为 null，需在界面填写或执行示例 SQL）
# 本机 registry:2 无认证：地址填与宿主机映射一致的主机:端口（如 127.0.0.1:5001），namespace 如 qdc，用户名密码可留空。
# 未配置或误指向 hub.docker.io 时，push 常见 insufficient_scope；示例 SQL 见 config/streampark/mysql/examples/docker-registry-local.example.sql
# 兄弟仓库排查文档：../quant-data-collect/docs/202604211400-streampark-docker-push-insufficient_scope.md
# 容器内 Flink 访问本机 Kubernetes API（127.0.0.1 误区、socat、kubeconfig 挂载）：../quant-data-collect/docs/202604221900-streampark-docker-kubernetes-api连接排查-socat.md

services:
  streampark:
    image: apache/streampark:v2.1.5  # 官方镜像，内置 Java 8
    container_name: streampark
    hostname: streampark
    ports:
      - "10000:10000"  # StreamPark Web UI
    environment:
      - TZ=Asia/Shanghai  # 中国时区
      # 字符编码配置 - 支持中文文件名
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - JAVA_TOOL_OPTIONS=-Dfile.encoding=UTF-8
      # MySQL 数据库配置 - 连接 Docker MySQL 服务
      - SPRING_DATASOURCE_DIALECT=mysql
      - SPRING_DATASOURCE_URL=jdbc:mysql://streampark-mysql:3306/streampark?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Hg19951030
      # 显式指定 kubeconfig，供 StreamPark/Fabric8 提交 Flink Native K8s 作业
      - KUBECONFIG=/root/.kube/config
    volumes:
      # 挂载 Docker socket，允许 StreamPark 管理容器
      - /var/run/docker.sock:/var/run/docker.sock
      # 挂载 hosts 文件（只读）
      - /etc/hosts:/etc/hosts:ro
      # StreamPark 数据持久化（使用本地目录）
      - ./volumes/streampark/data:/streampark/data
      # 挂载 Flink 到容器（只读）
      - ./volumes/streampark/flink/flink-1.17.2:/opt/flink/flink-1.17.2:ro
      # 挂载 Maven 本地仓库 - 避免重复下载依赖，节省时间和带宽
      - ~/.m2/repository:/root/.m2/repository
      # 挂载自定义配置文件 - 使用 MySQL（Doris）作为元数据存储
      - ./streampark-config.yaml:/streampark/conf/config.yaml:ro
      # 挂载 MySQL 驱动到容器 lib 目录 - 支持 MySQL/Doris 连接
      # 若本机 Maven 仓库中不是 8.3.0，请改路径或先 mvn dependency:copy 到该坐标
      - ~/.m2/repository/com/mysql/mysql-connector-j/8.3.0/mysql-connector-j-8.3.0.jar:/streampark/lib/mysql-connector-j-8.3.0.jar:ro
      # Kubernetes：仅挂载“单一专用 kubeconfig”，避免目录内多文件导致上下文漂移。
      # 默认建议：~/.kube/config-streampark-docker-desktop（可在 manage-streampark.sh 里通过
      # STREAMPARK_KUBECONFIG 覆盖）
      - ${STREAMPARK_KUBECONFIG}:/root/.kube/config:ro
      - ~/.ssh/id_ed25519:/root/.ssh/id_ed25519:ro
      - ~/.ssh/id_ed25519.pub:/root/.ssh/id_ed25519.pub:ro
      - ~/.ssh/known_hosts:/root/.ssh/known_hosts:ro
    extra_hosts:
      # 保证容器内 host.docker.internal 可解析（Linux Docker 环境也兼容）
      - "host.docker.internal:host-gateway"
    privileged: true
    restart: unless-stopped
    networks:
      - streampark-net
      - doris-net  # 连接到 Doris 网络
      - flink-net  # 连接到 Flink 网络
      - default    # 连接到默认网络（Kafka）
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000"]
      interval: 10s
      timeout: 5s
      retries: 30

networks:
  streampark-net:
    name: data-warehouse_streampark-net
    driver: bridge
  doris-net:
    external: true
    name: data-warehouse_doris-net
  flink-net:
    external: true
    name: data-warehouse_flink-net
  default:
    external: true
    name: data-warehouse_default

volumes:
  streampark-data:
