---
# 共享的命名空间
apiVersion: v1
kind: Namespace
metadata:
  name: flink

---
# 共享的 ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink
  namespace: flink

---
# 共享的 Role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink
  namespace: flink
rules:
- apiGroups: [""]
  resources: ["pods", "configmaps", "services"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
# 共享的 RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink
  namespace: flink
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flink
subjects:
- kind: ServiceAccount
  name: flink
  namespace: flink

---
# 共享的 Secret（所有任务共用）
apiVersion: v1
kind: Secret
metadata:
  name: flink-common-secret
  namespace: flink
type: Opaque
stringData:
  OKX_API_KEY: "your-api-key-here"
  OKX_SECRET_KEY: "your-secret-key-here"
  OKX_PASSPHRASE: "your-passphrase-here"
  PROXY_HOST: "localhost"
  PROXY_PORT: "10809"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"

---
# 共享的 PVC（所有任务共用）
# 注意: local-path 只支持 ReadWriteOnce，每个 Pod 需要独立的 PVC
# 或者使用 hostPath 卷（开发环境）
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: flink-shared-pvc
  namespace: flink
spec:
  accessModes:
  - ReadWriteOnce  # 修改为 ReadWriteOnce，适配 local-path provisioner
  resources:
    requests:
      storage: 10Gi  # 减小存储大小，适合本地开发
  storageClassName: standard
