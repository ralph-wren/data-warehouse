# ADS Arbitrage Job 配置
JOB_NAME: ads-arbitrage
JOB_CLASS: com.crypto.dw.flink.FlinkADSArbitrageJob

# 资源配置（套利任务需要更多资源）
JM_MEMORY: 2048m
JM_MEMORY_REQUEST: 1.5Gi
JM_MEMORY_LIMIT: 3Gi
JM_CPU_REQUEST: 1000m
JM_CPU_LIMIT: 2000m

TM_MEMORY: 3072m
TM_MEMORY_REQUEST: 2Gi
TM_MEMORY_LIMIT: 4Gi
TM_CPU_REQUEST: 1000m
TM_CPU_LIMIT: 2000m
TM_REPLICAS: 3
TM_SLOTS: 4

# Flink 配置
PARALLELISM: 2
CHECKPOINT_INTERVAL: 30000

# 镜像配置
DOCKER_REGISTRY: your-registry
VERSION: 1.0.0
