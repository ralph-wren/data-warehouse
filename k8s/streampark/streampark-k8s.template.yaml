apiVersion: apps/v1
kind: Deployment
metadata:
  name: streampark
  namespace: __NAMESPACE__
  labels:
    app: streampark
spec:
  replicas: 1
  progressDeadlineSeconds: 2400
  selector:
    matchLabels:
      app: streampark
  template:
    metadata:
      labels:
        app: streampark
    spec:
      serviceAccountName: __SERVICE_ACCOUNT__
      initContainers:
        - name: init-flink-dist
          image: __IMAGE__
          command:
            - sh
            - -c
            - >
              set -e;
              mkdir -p /opt/flink;
              rm -f /tmp/flink-dist.tgz;
              curl -fL --retry 5 --connect-timeout 15 --retry-delay 2 --retry-all-errors \
                -o /tmp/flink-dist.tgz "__FLINK_DIST_URL__";
              tar -xzf /tmp/flink-dist.tgz -C /opt/flink;
              rm -f /tmp/flink-dist.tgz;
              test -d /opt/flink/flink-1.17.2;
          volumeMounts:
            - name: flink-home
              mountPath: /opt/flink
        - name: init-mysql-driver
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -c
            - >
              set -euo pipefail;
              curl -fL --retry 3 --connect-timeout 10
              "https://repo1.maven.org/maven2/com/mysql/mysql-connector-j/8.3.0/mysql-connector-j-8.3.0.jar"
              -o /work/mysql-connector-j-8.3.0.jar
          volumeMounts:
            - name: mysql-driver
              mountPath: /work
      containers:
        - name: streampark
          image: __IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 10000
              name: http
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: LANG
              value: C.UTF-8
            - name: LC_ALL
              value: C.UTF-8
            - name: JAVA_TOOL_OPTIONS
              value: -Dfile.encoding=UTF-8
            - name: FLINK_HOME
              value: /opt/flink/flink-1.17.2
            - name: SPRING_DATASOURCE_DIALECT
              value: mysql
            - name: SPRING_DATASOURCE_URL
              value: "__SPRING_DATASOURCE_URL__"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: streampark-db
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: streampark-db
                  key: password
          readinessProbe:
            httpGet:
              path: /
              port: 10000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 10000
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "300m"
              memory: "768Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          volumeMounts:
            - name: flink-home
              mountPath: /opt/flink
            - name: streampark-data
              mountPath: /streampark/data
            - name: streampark-config
              mountPath: /streampark/conf/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: mysql-driver
              mountPath: /streampark/lib/mysql-connector-j-8.3.0.jar
              subPath: mysql-connector-j-8.3.0.jar
      volumes:
        - name: flink-home
          emptyDir: {}
        - name: streampark-data
          emptyDir: {}
        - name: streampark-config
          configMap:
            name: streampark-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: mysql-driver
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: streampark
  namespace: __NAMESPACE__
  labels:
    app: streampark
spec:
  type: NodePort
  selector:
    app: streampark
  ports:
    - name: http
      port: 10000
      targetPort: 10000
      nodePort: __NODE_PORT__
