# Prometheus 配置文件
# 用于监控 Flink 任务

global:
  scrape_interval: 15s      # 抓取间隔
  evaluation_interval: 15s  # 评估间隔
  external_labels:
    cluster: 'crypto-dw'
    environment: 'dev'

# 告警规则文件
rule_files:
  # - "alerts/*.yml"

# 抓取配置
scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Pushgateway - 接收 Flink 推送的指标
  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']

  # Flink JobManager - Prometheus Reporter
  - job_name: 'flink-jobmanager'
    static_configs:
      - targets: ['jobmanager:9249']  # Flink JobManager Prometheus Reporter
    
  # Flink TaskManager - Prometheus Reporter
  - job_name: 'flink-taskmanager'
    static_configs:
      - targets: 
        - 'taskmanager-1:9249'  # TaskManager 1
        - 'taskmanager-2:9249'  # TaskManager 2

  # Doris FE 监控 - 直接使用 Doris 的 Prometheus metrics 端点
  - job_name: 'doris-fe'
    static_configs:
      - targets: ['host.docker.internal:8030']
    metrics_path: '/metrics'

  # Doris BE 监控 - 直接使用 Doris 的 Prometheus metrics 端点
  - job_name: 'doris-be'
    static_configs:
      - targets: ['host.docker.internal:8040']
    metrics_path: '/metrics'

  # Kafka Exporter - Kafka 基础指标 (Topic、分区、副本等)
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']

  # Kafka JMX Exporter - Kafka 详细指标 (消息速率、吞吐量、请求延迟等)
  - job_name: 'kafka-jmx'
    static_configs:
      - targets: ['jmx-exporter:5556']
