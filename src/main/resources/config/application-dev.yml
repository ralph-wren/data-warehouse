# 开发环境配置（本地运行）
# 使用方式：设置环境变量 APP_ENV=dev 或使用 Program Args: --APP_ENV dev

# OKX 交易所配置
okx:
  # WebSocket API 配置
  websocket:
    # Ticker 数据使用 public 频道
    ticker-url: wss://ws.okx.com:8443/ws/v5/public
    # K线数据使用 business 频道（从 2023年6月20日起，K线数据迁移到 business 频道）
    kline-url: wss://ws.okx.com:8443/ws/v5/business
    # 私有频道 URL（用于订单数据）
    private-url: wss://ws.okx.com:8443/ws/v5/private
    reconnect:
      max-retries: 10
      initial-delay: 1000
      max-delay: 60000
  
  # API 认证信息（从环境变量读取）
  api:
    key: ${OKX_API_KEY}
    secret: ${OKX_SECRET_KEY}
    passphrase: ${OKX_PASSPHRASE}
  
  # 代理配置
  # 说明：国内访问 OKX WebSocket 可能需要代理
  # 如果连接失败出现 SSL 握手错误，请启用代理
  proxy:
    enabled: false  # 是否启用代理
    host: localhost  # 代理服务器地址
    port: 10809  # 代理服务器端口
  
  # 订阅的交易对（逗号分隔）
  # 多个交易对对应多个 Kafka 分区，数据会均匀分布
  # 注意：只订阅 OKX 上存在的交易对，避免订阅错误
  symbols:
    spot: AT-USDT,ATOM-USDT,AXS-USDT,BABY-USDT,BAND-USDT
    swap: AT-USDT,ATOM-USDT,AXS-USDT,BABY-USDT,BAND-USDT

# Kafka 配置
# 注意：本地开发环境使用 localhost
kafka:
  bootstrap-servers: localhost:9093  # 本地 Kafka 地址 (宿主机访问)

  
  # Producer 配置
  producer:
    acks: 1
    retries: 3
    batch-size: 16384
    linger-ms: 10
    compression-type: lz4
    max-in-flight-requests: 5
  
  # Consumer 配置
  consumer:
    auto-offset-reset: latest
    enable-auto-commit: false
    max-poll-records: 500
    startup-mode: latest  # 消费模式: earliest（从头开始）, latest（从最新开始）, committed（从上次提交位置开始）
    
    # 每个 Flink 作业使用不同的 Consumer Group ID
    # 这样可以独立管理每个作业的消费进度，避免相互影响
    group-id:
      collector: flink-collector-group        # 数据采集作业
      ods-datastream: flink-ods-datastream-group  # ODS DataStream 作业
      ods-sql: flink-ods-sql-group            # ODS SQL 作业
      dwd: flink-dwd-group                    # DWD 作业
      dws-1min: flink-dws-1min-group          # DWS 1分钟聚合作业
      ads-metrics: flink-ads-metrics-group    # ADS 实时指标作业
      ads-arbitrage: flink-ads-arbitrage-group  # ADS 套利计算作业
      ads-monitor: flink-ads-monitor-group    # ADS 市场监控作业
  
  # JMX 配置
  # 说明：禁用 Kafka JMX 可以消除 "Error registering AppInfo mbean" 警告
  # 这个警告是由于多个 Kafka Consumer 实例注册相同的 JMX MBean 导致的
  # 对程序运行没有影响，但会产生大量日志噪音
  jmx:
    disable: true  # 是否禁用 Kafka JMX (true=禁用，消除警告；false=启用，保留监控能力)

# Doris 配置
# 注意：本地开发环境使用 localhost 或 127.0.0.1
doris:
  # FE 节点配置
  fe:
    http-url: http://127.0.0.1:8030  # 本地 Doris FE 地址
    jdbc-url: jdbc:mysql://127.0.0.1:9030  # 本地 Doris FE JDBC 地址
    username: root
    password: ""
  
  # BE 节点配置
  # 说明：本地模式使用宿主机地址
  be:
    nodes: "127.0.0.1:8040"  # 宿主机地址 (本地模式)
  
  # 数据库配置
  database: crypto_dw
  
  # Stream Load 配置
  stream-load:
    batch-size: 1000
    batch-interval-ms: 5000
    max-retries: 3
    timeout-seconds: 600
    max-filter-ratio: 0.1
  
  # 表配置
  tables:
    ods: ods_crypto_ticker_rt
    dwd: dwd_crypto_ticker_detail
    dws-1min: dws_crypto_ticker_1min
    dws-5min: dws_crypto_ticker_5min
    ads: ads_crypto_market_overview

# Redis 配置
# 注意：本地开发环境使用 localhost
redis:
  host: localhost  # Redis 主机地址
  port: 6379       # Redis 端口
  timeout: 2000    # 连接超时时间（毫秒）
  password:        # Redis 密码（如果没有密码则留空）

# Flink 配置
flink:
  # 集群配置
  cluster:
    mode: local  # 运行模式: local（本地模式）, remote（远程集群）
    remote:
      host: localhost  # 远程集群 JobManager 地址
      port: 8081  # 远程集群 JobManager 端口
      jar-path: target/realtime-crypto-datawarehouse-1.0.0.jar  # JAR 包路径（相对于项目根目录）
  
  # 执行环境配置
  execution:
    runtime-mode: STREAMING  # 实时作业固定使用 STREAMING 模式
    parallelism: 4  # 本地开发可以使用较高并行度
    max-parallelism: 128  # 建议尽早固定，避免后续状态扩缩容带来 restore 复杂度
    buffer-timeout-ms: 100  # 延迟与吞吐的折中值；越小延迟越低，越大吞吐越高
    auto-watermark-interval-ms: 200  # Watermark 推进周期，事件时间作业建议保留
    operator-chaining: true  # 算子链配置：false=禁用（Web UI 显示详细算子），true=启用（性能优化）
  
  # Checkpoint 配置
  checkpoint:
    interval: 60000  # 60 秒，开发环境先用 1 分钟，减少本地频繁快照
    mode: EXACTLY_ONCE  # Kafka -> Doris 这类链路默认优先保证一致性
    timeout: 300000  # 5 分钟，避免本地磁盘或 IO 抖动导致超时
    min-pause: 10000  # 两次 Checkpoint 之间至少间隔 10 秒，降低状态后端压力
    max-concurrent: 1  # 一般建议保持 1，配置简单且更稳定
    tolerable-failed-checkpoints: 3  # 短时抖动允许少量失败，避免作业立刻重启
    externalized-retention: DELETE_ON_CANCELLATION  # 本地环境默认取消时删除，避免占满磁盘
    snapshot-compression: true  # 建议开启，减少快照体积
    checkpoints-after-tasks-finish: true  # 允许部分任务结束后继续参与 checkpoint
    unaligned:
      enabled: false  # 默认关闭；只有在明显反压、barrier 对齐慢时再开启
      aligned-timeout-ms: 0  # 0 表示一直走对齐 checkpoint
      max-subtasks-per-channel-state-file: 5  # 控制 channel state 文件数量，避免过碎
  
  # 状态后端配置
  state:
    backend: rocksdb  # 状态后端类型：rocksdb (生产推荐) / hashmap (开发测试)
    checkpoint-dir: file:///c/Users/ralph/IdeaProject/data-warehouse/rocksdb-dir/checkpoints  # Checkpoint 存储目录
    savepoint-dir: file:///c/Users/ralph/IdeaProject/data-warehouse/rocksdb-dir/savepoints  # Savepoint 存储目录
    incremental: true  # RocksDB 增量 Checkpoint，减少状态快照体积
    local-recovery: false  # 禁用本地恢复，避免 Windows 路径过长问题
    
    # RocksDB 性能优化配置
    # 解决 "arenaBlockSize > mutableLimit" 警告，避免频繁刷新 memtable
    rocksdb:
      managed-memory-size: 512m  # TaskManager 托管内存大小（本地模式）
      writebuffer-size: 64m  # 单个 ColumnFamily 的写缓冲区大小（默认 64MB）
      writebuffer-count: 3  # 写缓冲区数量（默认 2，增加到 3 提升写入性能）
      block-cache-size: 256m  # 块缓存大小，用于读取优化
      max-background-jobs: 4  # 后台压缩和刷新任务数量

  # 重启策略配置
  restart:
    strategy: fixed-delay  # 开发环境更适合固定延迟重启，便于定位问题
    fixed-delay:
      attempts: 3  # 最多重试 3 次
      delay-ms: 10000  # 每次重试前等待 10 秒
    failure-rate:
      max-failures-per-interval: 3  # 预留参数：切到 failure-rate 时可直接使用
      failure-rate-interval-ms: 600000  # 10 分钟统计窗口
      delay-ms: 30000  # 失败后等待 30 秒再重启
  
  # Web UI 配置
  web:
    enabled: true  # 启用 Web UI
    address: 0.0.0.0  # 监听所有网络接口
    submit:
      enable: true  # 允许通过 Web UI 提交作业
    cancel:
      enable: true  # 允许通过 Web UI 取消作业
    refresh-interval: 3000  # 刷新间隔（毫秒）
    # 各个作业的 Web UI 端口配置
    # 注意：每个作业需要使用不同的端口，避免端口冲突
    port:
      ods: 8083      # ODS 作业端口
      dwd: 8082      # DWD 作业端口
      dws-1min: 8084 # DWS 1分钟作业端口
      dws-5min: 8085 # DWS 5分钟作业端口

  metrics:
    enable: false
# 应用配置
application:
  # 日志配置
  logging:
    level: DEBUG  # 本地开发使用 DEBUG 级别，方便调试
    file: logs/crypto-dw.log
    max-file-size: 100MB
    max-history: 30
  
  # 监控配置
  metrics:
    enabled: true
    interval: 60
    pushgateway:
      host: localhost  # 本地 Pushgateway 地址
      port: 9091
  
  # 数据质量配置
  data-quality:
    # 时间戳容忍度（毫秒）
    timestamp-tolerance: 3600000
    # 价格范围验证
    price-min: 0.00000001
    price-max: 10000000
    # 去重窗口（毫秒）
    dedup-window: 5000

# 套利交易配置

ticker:
  subscribe:
    number: 20
  filter:
    margin-only: true  # 是否只订阅支持现货杠杆的币对(默认true,过滤掉不支持杠杆的币对)
    min-volume-24h: "100000"  # 最小24小时成交额(USDT),默认30万,过滤掉成交额不足的币种

arbitrage:
  # 监控配置
  monitor:
    top-symbols-count: 10            # 监控价差最高的币对数量(默认10个)
  
  # 缓存配置
  cache:
    refresh-interval-seconds: 3600    # 缓存刷新间隔(秒,默认1天)
  
  # 交易配置
  trading:
    enabled: true                   # 是否启用自动交易(默认关闭,测试通过后再开启)
    trade-amount-usdt: 5.5           # 单笔交易金额(USDT),会根据当前价格自动计算币的数量
                                     # 注意: OKX 现货最小下单金额通常是 5-10 USDT,合约最小交易单位是 1 张(1 个币)
                                     # 建议: 50 USDT 可以满足大部分币种的最小下单要求
                                     # 对于高价币种(如 BTC, ETH),需要更大的金额
    leverage: 1                      # 杠杆倍数(默认1倍,现货和合约统一使用)
    max-positions: 1                 # 最大持仓数量
    open-threshold: 0.005            # 开仓阈值(0.5%)
    close-threshold: 0.002           # 平仓阈值(0.2%)
    order-timeout-seconds: 30        # 订单超时时间(秒)
    max-hold-time-minutes: 60        # 最大持仓时间(分钟)
    max-loss-per-trade: 10           # 单笔最大亏损(USDT)
    log-dir: ./logs/trading          # 交易日志目录
    
    # 失败黑名单配置
    blacklist:
      enabled: true                  # 是否启用黑名单(默认启用)
      duration-minutes: 1460           # 黑名单持续时间(分钟,默认60分钟)
      max-failures: 1                # 最大失败次数(超过此次数加入黑名单)
