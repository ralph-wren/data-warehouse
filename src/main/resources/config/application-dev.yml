# 开发环境配置（本地运行）
# 使用方式：设置环境变量 APP_ENV=dev 或使用 Program Args: --APP_ENV dev

# OKX 交易所配置
okx:
  # WebSocket API 配置
  websocket:
    url: wss://ws.okx.com:8443/ws/v5/public
    reconnect:
      max-retries: 10
      initial-delay: 1000
      max-delay: 60000
  
  # API 认证信息（从环境变量读取）
  api:
    key: ${OKX_API_KEY}
    secret: ${OKX_SECRET_KEY}
    passphrase: ${OKX_PASSPHRASE}
  
  # 订阅的交易对（逗号分隔）
  # 多个交易对对应多个 Kafka 分区，数据会均匀分布
  # 注意：只订阅 OKX 上存在的交易对，避免订阅错误
  symbols: BTC-USDT,ETH-USDT,SOL-USDT,BNB-USDT,XRP-USDT,LTC-USDT,BCH-USDT,DOGE-USDT,ADA-USDT

# Kafka 配置
# 注意：本地开发环境使用 localhost
kafka:
  bootstrap-servers: localhost:9092  # 本地 Kafka 地址
  
  # Topic 配置
  topic:
    crypto-ticker: crypto_ticker
  
  # Producer 配置
  producer:
    acks: 1
    retries: 3
    batch-size: 16384
    linger-ms: 10
    compression-type: lz4
    max-in-flight-requests: 5
  
  # Consumer 配置
  consumer:
    group-id: flink-ods-consumer
    auto-offset-reset: latest
    enable-auto-commit: false
    max-poll-records: 500
    startup-mode: earliest  # 消费模式: earliest（从头开始）, latest（从最新开始）, committed（从上次提交位置开始）

# Doris 配置
# 注意：本地开发环境使用 localhost 或 127.0.0.1
doris:
  # FE 节点配置
  fe:
    http-url: http://127.0.0.1:8030  # 本地 Doris FE 地址
    jdbc-url: jdbc:mysql://127.0.0.1:9030  # 本地 Doris FE JDBC 地址
    username: root
    password: ""
  
  # BE 节点配置 (可选,用于解决 Docker 网络问题)
  # 如果 BE 使用 Docker 内部 IP,可以直接指定宿主机地址
  be:
    nodes: "127.0.0.1:8040"  # 本地 Doris BE 地址
  
  # 数据库配置
  database: crypto_dw
  
  # Stream Load 配置
  stream-load:
    batch-size: 1000
    batch-interval-ms: 5000
    max-retries: 3
    timeout-seconds: 600
    max-filter-ratio: 0.1
  
  # 表配置
  tables:
    ods: ods_crypto_ticker_rt
    dwd: dwd_crypto_ticker_detail
    dws-1min: dws_crypto_ticker_1min
    dws-5min: dws_crypto_ticker_5min
    ads: ads_crypto_market_overview

# Flink 配置
flink:
  # 执行环境配置
  execution:
    parallelism: 4  # 本地开发可以使用较高并行度
    max-parallelism: 128
  
  # Checkpoint 配置
  checkpoint:
    interval: 60000  # 60 秒（增加间隔，减少 Checkpoint 频率）
    mode: EXACTLY_ONCE
    timeout: 300000  # 5 分钟（增加超时时间，避免 Checkpoint 失败）
    min-pause: 500
    max-concurrent: 1
  
  # 状态后端配置
  state:
    backend: rocksdb
    checkpoint-dir: file:///tmp/flink-checkpoints
    savepoint-dir: file:///tmp/flink-savepoints
  
  # Web UI 配置
  web:
    enabled: true  # 启用 Web UI
    port: 8082  # Web UI 端口
    address: 0.0.0.0  # 监听所有网络接口
    submit:
      enable: true  # 允许通过 Web UI 提交作业
    cancel:
      enable: true  # 允许通过 Web UI 取消作业
    refresh-interval: 3000  # 刷新间隔（毫秒）

# 应用配置
application:
  # 日志配置
  logging:
    level: DEBUG  # 本地开发使用 DEBUG 级别，方便调试
    file: logs/crypto-dw.log
    max-file-size: 100MB
    max-history: 30
  
  # 监控配置
  metrics:
    enabled: true
    interval: 60
    pushgateway:
      host: localhost  # 本地 Pushgateway 地址
      port: 9091
  
  # 数据质量配置
  data-quality:
    # 时间戳容忍度（毫秒）
    timestamp-tolerance: 3600000
    # 价格范围验证
    price-min: 0.00000001
    price-max: 10000000
    # 去重窗口（毫秒）
    dedup-window: 5000
