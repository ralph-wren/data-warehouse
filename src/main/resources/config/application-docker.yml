# Docker 环境配置
# 用于在 Docker 容器中运行 Flink 作业
# 使用方式：设置环境变量 APP_ENV=docker 或使用 Program Args: --APP_ENV docker

# OKX 交易所配置
okx:
  # WebSocket API 配置
  websocket:
    # Ticker 数据使用 public 频道
    ticker-url: wss://ws.okx.com:8443/ws/v5/public
    # K线数据使用 business 频道（从 2023年6月20日起，K线数据迁移到 business 频道）
    kline-url: wss://ws.okx.com:8443/ws/v5/business
    reconnect:
      max-retries: 10
      initial-delay: 1000
      max-delay: 60000
  
  # API 认证信息（从环境变量读取）
  api:
    key: ${OKX_API_KEY}
    secret: ${OKX_SECRET_KEY}
    passphrase: ${OKX_PASSPHRASE}

  # 公开行情 REST；容器/机房出口 IP 偶发被 WAF 403 时可调整 base-url 或 user-agent
  rest:
    base-url: https://www.okx.com

  # 订阅的交易对（逗号分隔）
  # 多个交易对对应多个 Kafka 分区，数据会均匀分布
  # 注意：只订阅 OKX 上存在的交易对，避免订阅错误
  symbols: BTC-USDT,ETH-USDT,SOL-USDT,BNB-USDT,XRP-USDT,LTC-USDT,BCH-USDT,DOGE-USDT,ADA-USDT

# Kafka 配置
# 注意：在 Docker 容器中，使用容器名称而不是 localhost
kafka:
  bootstrap-servers: kafka:9093  # Docker 容器名称 (远程集群模式)
  
  # Topic 配置
  topic:
    crypto-ticker-spot: crypto-ticker-spot  # 现货 Topic
    crypto-ticker-swap: crypto-ticker-swap  # 合约 Topic
  
  # Producer 配置
  producer:
    acks: 1
    retries: 3
    batch-size: 16384
    linger-ms: 10
    compression-type: lz4
    max-in-flight-requests: 5
  
  # Consumer 配置
  consumer:
    auto-offset-reset: latest
    enable-auto-commit: false
    max-poll-records: 500
    startup-mode: earliest  # 消费模式: earliest（从头开始）, latest（从最新开始）, committed（从上次提交位置开始）
    
    # 每个 Flink 作业使用不同的 Consumer Group ID
    # 这样可以独立管理每个作业的消费进度，避免相互影响
    group-id:
      collector: flink-collector-group        # 数据采集作业
      ods-datastream: flink-ods-datastream-group  # ODS DataStream 作业
      ods-sql: flink-ods-sql-group            # ODS SQL 作业
      dwd: flink-dwd-group                    # DWD 作业
      dws-1min: flink-dws-1min-group          # DWS 1分钟聚合作业
      ads-metrics: flink-ads-metrics-group    # ADS 实时指标作业
      ads-arbitrage: flink-ads-arbitrage-group  # 兼容旧配置，建议新作业使用下面两个独立 group
      ads-arbitrage-spot: flink-ads-arbitrage-spot-group  # ADS 套利现货行情消费
      ads-arbitrage-swap: flink-ads-arbitrage-swap-group  # ADS 套利合约行情消费
      ads-monitor: flink-ads-monitor-group    # ADS 市场监控作业

# Doris 配置
# 注意：在 Docker 容器中运行时，使用容器名称而不是 127.0.0.1
doris:
  # FE 节点配置
  fe:
    http-url: http://doris-fe:8030  # Docker 容器名称
    jdbc-url: jdbc:mysql://doris-fe:9030  # Docker 容器名称
    username: root
    password: ""
  
  # BE 节点配置
  # 说明：远程集群模式使用容器名称
  be:
    nodes: "doris-be:8040"  # Docker 容器名称 (远程集群模式)
  
  # 数据库配置
  database: crypto_dw
  
  # Stream Load 配置
  stream-load:
    batch-size: 1000
    batch-interval-ms: 5000
    max-retries: 3
    timeout-seconds: 600
    max-filter-ratio: 0.1
  
  # 表配置
  tables:
    ods: ods_crypto_ticker_rt
    dwd: dwd_crypto_ticker_detail
    dws-1min: dws_crypto_ticker_1min
    dws-5min: dws_crypto_ticker_5min
    ads: ads_crypto_market_overview

# Flink 配置
flink:
  # 执行环境配置
  execution:
    runtime-mode: STREAMING  # Docker 中运行的也是长跑流式作业
    parallelism: 4  # Docker 环境可以使用更高的并行度
    max-parallelism: 128  # 状态分片上限，建议提前固定
    buffer-timeout-ms: 100  # 常用吞吐/延迟折中值
    auto-watermark-interval-ms: 200  # 事件时间 Watermark 刷新间隔
    operator-chaining: true  # 算子链配置：false=禁用（Web UI 显示详细算子），true=启用（性能优化）
  
  # Checkpoint 配置
  checkpoint:
    interval: 60000  # 60 秒，Docker 环境默认 1 分钟做一次快照
    mode: EXACTLY_ONCE  # 默认优先保证端到端一致性
    timeout: 300000  # 5 分钟
    min-pause: 10000  # 给状态后端留足喘息时间，减少连续 checkpoint 压力
    max-concurrent: 1  # 大多数生产流式作业建议保持 1
    tolerable-failed-checkpoints: 3  # 容忍短时故障
    externalized-retention: RETAIN_ON_CANCELLATION  # 容器环境取消后保留恢复点，方便回滚
    snapshot-compression: true  # 建议开启
    checkpoints-after-tasks-finish: true  # 对混合作业更友好
    unaligned:
      enabled: false  # 默认关闭；如果出现持续反压，再按需开启
      aligned-timeout-ms: 0  # 关闭超时切换
      max-subtasks-per-channel-state-file: 5  # 控制 channel state 文件聚合度
  
  # 状态后端配置
  state:
    backend: rocksdb  # 状态后端类型：推荐 rocksdb / hashmap
    # Docker 环境使用容器内路径
    checkpoint-dir: file:///opt/flink/checkpoints  # Checkpoint 存储目录
    savepoint-dir: file:///opt/flink/savepoints  # Savepoint 存储目录
    incremental: true  # RocksDB 增量 Checkpoint，减少状态快照体积
    local-recovery: true  # 启用本地恢复，加快失败恢复速度
    
    # RocksDB 性能优化配置
    # 解决 "arenaBlockSize > mutableLimit" 警告，避免频繁刷新 memtable
    rocksdb:
      managed-memory-size: 512m  # TaskManager 托管内存大小（远程集群模式）
      writebuffer-size: 64m  # 单个 ColumnFamily 的写缓冲区大小（默认 64MB）
      writebuffer-count: 3  # 写缓冲区数量（默认 2，增加到 3 提升写入性能）
      block-cache-size: 256m  # 块缓存大小，用于读取优化
      max-background-jobs: 4  # 后台压缩和刷新任务数量

  # 重启策略配置
  restart:
    strategy: failure-rate  # Docker 更接近长期运行环境，建议使用 failure-rate
    fixed-delay:
      attempts: 5  # 预留参数：切换到 fixed-delay 时可直接使用
      delay-ms: 15000  # 固定延迟 15 秒
    failure-rate:
      max-failures-per-interval: 3  # 10 分钟内允许最多失败 3 次
      failure-rate-interval-ms: 600000
      delay-ms: 30000  # 单次失败后等待 30 秒再拉起
  
  # Web UI 配置
  web:
    enabled: true  # 启用 Web UI
    address: 0.0.0.0  # 监听所有网络接口
    submit:
      enable: true  # 允许通过 Web UI 提交作业
    cancel:
      enable: true  # 允许通过 Web UI 取消作业
    refresh-interval: 3000  # 刷新间隔（毫秒）
    # 各个作业的 Web UI 端口配置
    # 注意：每个作业需要使用不同的端口，避免端口冲突
    port:
      ods: 8083      # ODS 作业端口
      dwd: 8082      # DWD 作业端口
      dws-1min: 8084 # DWS 1分钟作业端口
      dws-5min: 8085 # DWS 5分钟作业端口

# 应用配置
application:
  # 日志配置
  logging:
    level: INFO  # Docker 环境使用 INFO 级别，减少日志量
    file: /opt/flink/logs/crypto-dw.log  # Docker 容器内路径
    max-file-size: 100MB
    max-history: 30
  
  # 监控配置
  metrics:
    enabled: true
    interval: 60
    pushgateway:
      host: pushgateway  # Docker 容器名称
      port: 9091
  
  # 数据质量配置
  data-quality:
    # 时间戳容忍度（毫秒）
    timestamp-tolerance: 3600000
    # 价格范围验证
    price-min: 0.00000001
    price-max: 10000000
    # 去重窗口（毫秒）
    dedup-window: 5000

# 套利交易配置
arbitrage:
  trading:
    enabled: false                   # 是否启用自动交易(默认关闭)
    trade-amount: 100                # 单笔交易金额(USDT)
    max-positions: 5                 # 最大持仓数量
    open-threshold: 0.005            # 开仓阈值(0.5%)
    close-threshold: 0.002           # 平仓阈值(0.2%)
    order-timeout-seconds: 30        # 订单超时时间(秒)
    max-hold-time-minutes: 60        # 最大持仓时间(分钟)
    max-loss-per-trade: 10           # 单笔最大亏损(USDT)
