# Docker 环境配置
# 用于在 Docker 容器中运行 Flink 作业
# 使用方式：设置环境变量 APP_ENV=docker 或使用 Program Args: --APP_ENV docker

# OKX 交易所配置
okx:
  # WebSocket API 配置
  websocket:
    url: wss://ws.okx.com:8443/ws/v5/public
    reconnect:
      max-retries: 10
      initial-delay: 1000
      max-delay: 60000
  
  # API 认证信息（从环境变量读取）
  api:
    key: ${OKX_API_KEY}
    secret: ${OKX_SECRET_KEY}
    passphrase: ${OKX_PASSPHRASE}
  
  # 订阅的交易对（逗号分隔）
  # 多个交易对对应多个 Kafka 分区，数据会均匀分布
  # 注意：只订阅 OKX 上存在的交易对，避免订阅错误
  symbols: BTC-USDT,ETH-USDT,SOL-USDT,BNB-USDT,XRP-USDT,LTC-USDT,BCH-USDT,DOGE-USDT,ADA-USDT

# Kafka 配置
# 注意：在 Docker 容器中，使用容器名称而不是 localhost
kafka:
  bootstrap-servers: kafka:9092  # Docker 容器名称
  
  # Topic 配置
  topic:
    crypto-ticker: crypto_ticker
  
  # Producer 配置
  producer:
    acks: 1
    retries: 3
    batch-size: 16384
    linger-ms: 10
    compression-type: lz4
    max-in-flight-requests: 5
  
  # Consumer 配置
  consumer:
    auto-offset-reset: latest
    enable-auto-commit: false
    max-poll-records: 500
    startup-mode: earliest  # 消费模式: earliest（从头开始）, latest（从最新开始）, committed（从上次提交位置开始）

# Doris 配置
# 注意：在 Docker 容器中运行时，使用容器名称而不是 127.0.0.1
doris:
  # FE 节点配置
  fe:
    http-url: http://doris-fe:8030  # Docker 容器名称
    jdbc-url: jdbc:mysql://doris-fe:9030  # Docker 容器名称
    username: root
    password: ""
  
  # BE 节点配置
  be:
    nodes: "doris-be:8040"  # Docker 容器名称
  
  # 数据库配置
  database: crypto_dw
  
  # Stream Load 配置
  stream-load:
    batch-size: 1000
    batch-interval-ms: 5000
    max-retries: 3
    timeout-seconds: 600
    max-filter-ratio: 0.1
  
  # 表配置
  tables:
    ods: ods_crypto_ticker_rt
    dwd: dwd_crypto_ticker_detail
    dws-1min: dws_crypto_ticker_1min
    dws-5min: dws_crypto_ticker_5min
    ads: ads_crypto_market_overview

# Flink 配置
flink:
  # 执行环境配置
  execution:
    parallelism: 4  # Docker 环境可以使用更高的并行度
    max-parallelism: 128
  
  # Checkpoint 配置
  checkpoint:
    interval: 60000  # 60 秒
    mode: EXACTLY_ONCE
    timeout: 300000  # 5 分钟
    min-pause: 500
    max-concurrent: 1
  
  # 状态后端配置
  state:
    backend: rocksdb
    # Docker 环境使用容器内路径
    checkpoint-dir: file:///opt/flink/checkpoints
    savepoint-dir: file:///opt/flink/savepoints
  
  # Web UI 配置
  web:
    enabled: true  # 启用 Web UI
    port: 8082  # Web UI 端口
    address: 0.0.0.0  # 监听所有网络接口
    submit:
      enable: true  # 允许通过 Web UI 提交作业
    cancel:
      enable: true  # 允许通过 Web UI 取消作业
    refresh-interval: 3000  # 刷新间隔（毫秒）

# 应用配置
application:
  # 日志配置
  logging:
    level: INFO  # Docker 环境使用 INFO 级别，减少日志量
    file: /opt/flink/logs/crypto-dw.log  # Docker 容器内路径
    max-file-size: 100MB
    max-history: 30
  
  # 监控配置
  metrics:
    enabled: true
    interval: 60
    pushgateway:
      host: pushgateway  # Docker 容器名称
      port: 9091
  
  # 数据质量配置
  data-quality:
    # 时间戳容忍度（毫秒）
    timestamp-tolerance: 3600000
    # 价格范围验证
    price-min: 0.00000001
    price-max: 10000000
    # 去重窗口（毫秒）
    dedup-window: 5000
