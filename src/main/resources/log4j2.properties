# Log4j2 配置文件
# 用于配置应用程序的日志输出
# 特性：
# 1. 每 3 小时生成一个新日志文件
# 2. 每种日志一个目录
# 3. 3 天过期自动删除

# 状态日志级别（Log4j2 内部日志）
name = FlinkAppConfig
status = warn
monitorInterval = 0

# 根日志配置
rootLogger.level = INFO
rootLogger.appenderRef.console.ref = ConsoleAppender
rootLogger.appenderRef.app.ref = AppFileAppender
rootLogger.appenderRef.error.ref = ErrorFileAppender

# ========================================
# Appender 配置
# ========================================

# 1. 控制台输出
appender.console.type = Console
appender.console.name = ConsoleAppender
appender.console.target = SYSTEM_OUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%t] %c{1}:%L - %m%n

# 2. 应用日志文件（滚动，每 3 小时一个文件）
appender.app.type = RollingFile
appender.app.name = AppFileAppender
appender.app.fileName = logs/app/flink-app.log
appender.app.filePattern = logs/app/flink-app-%d{yyyy-MM-dd-HH}-%i.log.gz
appender.app.layout.type = PatternLayout
appender.app.layout.pattern = %d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%t] %c{1}:%L - %m%n
# 滚动策略：每 3 小时或文件大小超过 100MB
appender.app.policies.type = Policies
appender.app.policies.time.type = TimeBasedTriggeringPolicy
appender.app.policies.time.interval = 3
appender.app.policies.time.modulate = true
appender.app.policies.size.type = SizeBasedTriggeringPolicy
appender.app.policies.size.size = 100MB
# 删除策略：保留 3 天
appender.app.strategy.type = DefaultRolloverStrategy
appender.app.strategy.delete.type = Delete
appender.app.strategy.delete.basePath = logs/app
appender.app.strategy.delete.maxDepth = 1
appender.app.strategy.delete.ifLastModified.type = IfLastModified
appender.app.strategy.delete.ifLastModified.age = 3d

# 3. Flink 日志文件（滚动，每 3 小时一个文件）
appender.flink.type = RollingFile
appender.flink.name = FlinkFileAppender
appender.flink.fileName = logs/flink/flink.log
appender.flink.filePattern = logs/flink/flink-%d{yyyy-MM-dd-HH}-%i.log.gz
appender.flink.layout.type = PatternLayout
appender.flink.layout.pattern = %d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%t] %c{1}:%L - %m%n
appender.flink.policies.type = Policies
appender.flink.policies.time.type = TimeBasedTriggeringPolicy
appender.flink.policies.time.interval = 3
appender.flink.policies.time.modulate = true
appender.flink.policies.size.type = SizeBasedTriggeringPolicy
appender.flink.policies.size.size = 100MB
appender.flink.strategy.type = DefaultRolloverStrategy
appender.flink.strategy.delete.type = Delete
appender.flink.strategy.delete.basePath = logs/flink
appender.flink.strategy.delete.maxDepth = 1
appender.flink.strategy.delete.ifLastModified.type = IfLastModified
appender.flink.strategy.delete.ifLastModified.age = 3d

# 4. Doris 日志文件（滚动，每 3 小时一个文件）
appender.doris.type = RollingFile
appender.doris.name = DorisFileAppender
appender.doris.fileName = logs/doris/doris.log
appender.doris.filePattern = logs/doris/doris-%d{yyyy-MM-dd-HH}-%i.log.gz
appender.doris.layout.type = PatternLayout
appender.doris.layout.pattern = %d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%t] %c{1}:%L - %m%n
appender.doris.policies.type = Policies
appender.doris.policies.time.type = TimeBasedTriggeringPolicy
appender.doris.policies.time.interval = 3
appender.doris.policies.time.modulate = true
appender.doris.policies.size.type = SizeBasedTriggeringPolicy
appender.doris.policies.size.size = 100MB
appender.doris.strategy.type = DefaultRolloverStrategy
appender.doris.strategy.delete.type = Delete
appender.doris.strategy.delete.basePath = logs/doris
appender.doris.strategy.delete.maxDepth = 1
appender.doris.strategy.delete.ifLastModified.type = IfLastModified
appender.doris.strategy.delete.ifLastModified.age = 3d

# 5. Kafka 日志文件（滚动，每 3 小时一个文件）
appender.kafka.type = RollingFile
appender.kafka.name = KafkaFileAppender
appender.kafka.fileName = logs/kafka/kafka.log
appender.kafka.filePattern = logs/kafka/kafka-%d{yyyy-MM-dd-HH}-%i.log.gz
appender.kafka.layout.type = PatternLayout
appender.kafka.layout.pattern = %d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%t] %c{1}:%L - %m%n
appender.kafka.policies.type = Policies
appender.kafka.policies.time.type = TimeBasedTriggeringPolicy
appender.kafka.policies.time.interval = 3
appender.kafka.policies.time.modulate = true
appender.kafka.policies.size.type = SizeBasedTriggeringPolicy
appender.kafka.policies.size.size = 100MB
appender.kafka.strategy.type = DefaultRolloverStrategy
appender.kafka.strategy.delete.type = Delete
appender.kafka.strategy.delete.basePath = logs/kafka
appender.kafka.strategy.delete.maxDepth = 1
appender.kafka.strategy.delete.ifLastModified.type = IfLastModified
appender.kafka.strategy.delete.ifLastModified.age = 3d

# 6. 错误日志文件（滚动，每 3 小时一个文件）
appender.error.type = RollingFile
appender.error.name = ErrorFileAppender
appender.error.fileName = logs/error/error.log
appender.error.filePattern = logs/error/error-%d{yyyy-MM-dd-HH}-%i.log.gz
appender.error.layout.type = PatternLayout
appender.error.layout.pattern = %d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%t] %c{1}:%L - %m%n
appender.error.filter.threshold.type = ThresholdFilter
appender.error.filter.threshold.level = ERROR
appender.error.policies.type = Policies
appender.error.policies.time.type = TimeBasedTriggeringPolicy
appender.error.policies.time.interval = 3
appender.error.policies.time.modulate = true
appender.error.policies.size.type = SizeBasedTriggeringPolicy
appender.error.policies.size.size = 100MB
appender.error.strategy.type = DefaultRolloverStrategy
appender.error.strategy.delete.type = Delete
appender.error.strategy.delete.basePath = logs/error
appender.error.strategy.delete.maxDepth = 1
appender.error.strategy.delete.ifLastModified.type = IfLastModified
appender.error.strategy.delete.ifLastModified.age = 3d

# ========================================
# Logger 配置
# ========================================

# 项目日志（com.crypto.dw）
logger.crypto.name = com.crypto.dw
logger.crypto.level = DEBUG
logger.crypto.additivity = false
logger.crypto.appenderRef.console.ref = ConsoleAppender
logger.crypto.appenderRef.app.ref = AppFileAppender
logger.crypto.appenderRef.error.ref = ErrorFileAppender

# Flink 日志
logger.flink.name = org.apache.flink
logger.flink.level = INFO
logger.flink.additivity = false
logger.flink.appenderRef.console.ref = ConsoleAppender
logger.flink.appenderRef.flink.ref = FlinkFileAppender
logger.flink.appenderRef.error.ref = ErrorFileAppender

# Doris 日志
logger.doris.name = org.apache.doris
logger.doris.level = INFO
logger.doris.additivity = false
logger.doris.appenderRef.console.ref = ConsoleAppender
logger.doris.appenderRef.doris.ref = DorisFileAppender
logger.doris.appenderRef.error.ref = ErrorFileAppender

# Kafka 日志
logger.kafka.name = org.apache.kafka
logger.kafka.level = WARN
logger.kafka.additivity = false
logger.kafka.appenderRef.console.ref = ConsoleAppender
logger.kafka.appenderRef.kafka.ref = KafkaFileAppender
logger.kafka.appenderRef.error.ref = ErrorFileAppender

# 其他第三方库日志级别
logger.netty.name = io.netty
logger.netty.level = WARN

logger.akka.name = akka
logger.akka.level = WARN

logger.zookeeper.name = org.apache.zookeeper
logger.zookeeper.level = WARN
